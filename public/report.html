<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報管理</title>
<link rel="stylesheet" href="menu.css">

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{padding:20px;max-width:900px;margin:auto}

h2{margin-bottom:10px}

/* 基本情報 */
.basic-group label{font-weight:bold}
.basic-group input{width:100%;padding:8px;margin:4px 0;border:1px solid #ccc;border-radius:6px}

/* 明細表 */
table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
.addLineBtn{margin-top:10px;padding:8px 14px;background:#4285f4;color:white;border:none;border-radius:6px;cursor:pointer}

/* 保存ボタン */
.saveBtn{display:block;width:100%;padding:12px;background:#e63333;color:white;border:none;border-radius:6px;font-size:18px;cursor:pointer;margin-top:20px}
</style>
</head>
<body>

<div id="menu"></div>

<div class="container">

<h2>日報入力</h2>

<!-- 基本情報 -->
<div class="basic-group">
<label>日付</label>
<input type="date" id="reportDate">

<label>店舗</label>
<input type="text" id="store" placeholder="例：天童">

<label>担当者</label>
<input type="text" id="staff">

<label>案件番号</label>
<input type="text" id="caseNo" readonly>
</div>

<!-- 明細 -->
<h3>買い取り明細</h3>
<table id="detailTable">
<thead>
<tr>
<th>品目</th>
<th>品名</th>
<th>数量</th>
<th>単価</th>
<th>金額</th>
<th>備考</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
<button class="addLineBtn" onclick="addLine()">＋行追加</button>

<!-- 支払/入金 -->
<h3>レジ・経費</h3>
<label>レジ入金</label>
<input type="number" id="regiIncome" placeholder="例：10000">

<label>経費出金</label>
<input type="number" id="expenseOut" placeholder="例：5000">

<!-- 全体メモ -->
<label>備考 / その他</label>
<textarea id="reportMemo" rows="3" style="width:100%;border:1px solid #ccc;border-radius:6px"></textarea>

<button class="saveBtn" onclick="saveReport()">日報を保存</button>

</div>

<script type="module" src="menu.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import {
  getFirestore,collection,addDoc,serverTimestamp,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
 apiKey:"AIzaSyACBuhohMmUJc_aQScQGqeLMN8mmsxRFmo",
 authDomain:"liagroup-a1ab1.firebaseapp.com",
 projectId:"liagroup-a1ab1",
 storageBucket:"liagroup-a1ab1.appspot.com",
 messagingSenderId:"361842389207",
 appId:"1:361842389207:web:1a7b92ef9d85b2726a4092"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

/* 認証 */
onAuthStateChanged(auth,user=>{
 if(!user){location.replace("index.html");return;}
 createMenu("日報管理");
});

/* 案件番号自動 */
async function genCase(){
 const date=document.getElementById("reportDate").value.replaceAll("-","");
 const q=query(collection(db,"reports"),where("dateKey","==",date));
 const snap=await getDocs(q);
 document.getElementById("caseNo").value=`${date}-${snap.size+1}`;
}

/* 日付変更で案件番号更新 */
document.getElementById("reportDate").addEventListener("change",genCase);

/* 明細行追加 */
function addLine(){
 const tr=document.createElement("tr");
 tr.innerHTML=`
  <td><input class="item"></td>
  <td><input class="name"></td>
  <td><input type="number" class="qty" value="1"></td>
  <td><input type="number" class="unit" value="0"></td>
  <td class="amt">0</td>
  <td><input class="note"></td>
  <td><button onclick="this.closest('tr').remove()">削除</button></td>
 `;
 tr.querySelector(".qty").oninput=()=>calcRow(tr);
 tr.querySelector(".unit").oninput=()=>calcRow(tr);
 document.querySelector("#detailTable tbody").appendChild(tr);
}
addLine();

/* 行金額 */
function calcRow(tr){
 const q=Number(tr.querySelector(".qty").value);
 const u=Number(tr.querySelector(".unit").value);
 tr.querySelector(".amt").textContent=(q*u).toLocaleString();
}

/* 保存 */
async function saveReport(){
 const dateVal=document.getElementById("reportDate").value;
 const storeVal=document.getElementById("store").value;
 const staffVal=document.getElementById("staff").value;
 const caseVal=document.getElementById("caseNo").value;
 const reportMemo=document.getElementById("reportMemo").value;

const summaryRef=await addDoc(collection(db,"reports"),{
 date:dateVal,store:storeVal,staff:staffVal,caseNo,reportMemo,
 dateKey:dateVal.replaceAll("-",""),createdAt:serverTimestamp()
});

/* 明細 sales */
document.querySelectorAll("#detailTable tbody tr").forEach(async tr=>{
 const item=tr.querySelector(".item").value;
 const name=tr.querySelector(".name").value;
 const qty=Number(tr.querySelector(".qty").value);
 const unit=Number(tr.querySelector(".unit").value);
 const amount=qty*unit;
 const note=tr.querySelector(".note").value;

 await addDoc(collection(db,"sales"),{
  reportId:summaryRef.id,
  item,name,qty,unit,amount,note,
  store:storeVal,staff:staffVal,caseNo,
  createdAt:serverTimestamp()
 });

 /* 自動出金 */
 if(amount>0){
  await addDoc(collection(db,"expenses"),{
   type:"out",
   item:"買取",
   amount,caseNo,createdAt:serverTimestamp()
  });
 }
});

/* レジ/経費 */
const regi=Number(document.getElementById("regiIncome").value);
if(regi>0){
 await addDoc(collection(db,"expenses"),{
  type:"in",item:"現金売上",amount:regi,caseNo,createdAt:serverTimestamp()
 });
}
const expOut=Number(document.getElementById("expenseOut").value);
if(expOut>0){
 await addDoc(collection(db,"expenses"),{
  type:"out",item:"経費",amount:expOut,caseNo,createdAt:serverTimestamp()
 });
}

alert("日報保存完了");
}
</script>

</body>
</html>
