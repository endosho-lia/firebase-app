<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報管理</title>

<style>
body{font-family:sans-serif;background:#f4f4f4;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.section{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,textarea{width:100%;padding:8px;margin:4px 0;border:1px solid #ccc;border-radius:6px}
.flex{display:flex;gap:10px}
.flex>div{flex:1}
.hidden{display:none}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
.saveBtn{background:#e53935;color:white;padding:12px;border:none;border-radius:8px;width:100%;font-size:16px}

.toggleWrap{display:flex;gap:10px;margin-bottom:15px}
.toggleBtn{
 flex:1;
 padding:12px;
 font-size:18px;
 border:none;
 border-radius:10px;
 cursor:pointer;
 background:#ccc;
 color:white;
}
.winActive{background:#2e7d32}
.loseActive{background:#c62828}

.cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.card{padding:10px;border-radius:8px;color:white;min-width:200px}
.win{background:#2e7d32}
.lose{background:#c62828}
</style>
</head>

<body>
<div class="container">
<h2>日報入力</h2>

<!-- 切替ボタン -->
<div class="toggleWrap">
<button id="winBtn" class="toggleBtn">成約</button>
<button id="loseBtn" class="toggleBtn">失注</button>
</div>

<!-- 成約フォーム -->
<div id="winForm" class="section hidden">
<h3>成約情報</h3>
<input id="lastName" placeholder="姓">
<input id="firstName" placeholder="名">

<h3>買取品目</h3>
<table id="itemTable">
<thead>
<tr><th>品目</th><th>買取価格</th><th>売上価格</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button type="button" id="addBtn">＋追加</button>

<h4>買取合計: <span id="buyTotal">0</span> 円</h4>
<h4>売上合計: <span id="sellTotal">0</span> 円</h4>
</div>

<!-- 失注フォーム -->
<div id="loseForm" class="section hidden">
<h3>失注情報</h3>
<textarea id="loseReason" placeholder="失注理由"></textarea>
</div>

<button class="saveBtn" id="saveBtn">保存</button>

<h3>本日の日報</h3>
<div class="cards" id="todayCards"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore,collection,addDoc,serverTimestamp,getDocs,query,where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyACBuhohMmUJc_aQScQGqeLMN8mmsxRFmo",
 authDomain:"liagroup-a1ab1.firebaseapp.com",
 projectId:"liagroup-a1ab1",
 storageBucket:"liagroup-a1ab1.appspot.com",
 messagingSenderId:"361842389207",
 appId:"1:361842389207:web:1a7b92ef9d85b2726a4092"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* DOM */
const winBtn=document.getElementById("winBtn");
const loseBtn=document.getElementById("loseBtn");
const winForm=document.getElementById("winForm");
const loseForm=document.getElementById("loseForm");
const buyTotal=document.getElementById("buyTotal");
const sellTotal=document.getElementById("sellTotal");
const todayCards=document.getElementById("todayCards");

let isWin=null;

/* ボタン切替 */
winBtn.addEventListener("click",()=>{
 isWin=true;
 winForm.classList.remove("hidden");
 loseForm.classList.add("hidden");
 winBtn.classList.add("winActive");
 loseBtn.classList.remove("loseActive");
});

loseBtn.addEventListener("click",()=>{
 isWin=false;
 loseForm.classList.remove("hidden");
 winForm.classList.add("hidden");
 loseBtn.classList.add("loseActive");
 winBtn.classList.remove("winActive");
});

/* 行追加 */
function addRow(){
 const tr=document.createElement("tr");
 tr.innerHTML=`
 <td><input class="item"></td>
 <td><input type="number" class="buy" value="0"></td>
 <td><input type="number" class="sell" value="0"></td>
 <td><button type="button" class="delBtn">削除</button></td>
 `;
 tr.querySelector(".delBtn").addEventListener("click",()=>{tr.remove();calc();});
 tr.querySelectorAll("input").forEach(i=>i.addEventListener("input",calc));
 document.querySelector("#itemTable tbody").appendChild(tr);
}
document.getElementById("addBtn").addEventListener("click",addRow);
addRow();

/* 合計 */
function calc(){
 let buy=0,sell=0;
 document.querySelectorAll(".buy").forEach(i=>buy+=Number(i.value||0));
 document.querySelectorAll(".sell").forEach(i=>sell+=Number(i.value||0));
 buyTotal.textContent=buy.toLocaleString();
 sellTotal.textContent=sell.toLocaleString();
}

/* 保存 */
document.getElementById("saveBtn").addEventListener("click",async()=>{
 if(isWin===null){
  alert("成約か失注を選択してください");
  return;
 }

 const today=new Date().toISOString().split("T")[0];

 const data={
  isWin,
  date:today,
  buyTotal:Number(buyTotal.textContent.replace(/,/g,"")),
  sellTotal:Number(sellTotal.textContent.replace(/,/g,"")),
  createdAt:serverTimestamp()
 };

 if(isWin){
  data.lastName=document.getElementById("lastName").value;
  data.firstName=document.getElementById("firstName").value;
 }else{
  data.loseReason=document.getElementById("loseReason").value;
 }

 await addDoc(collection(db,"reports"),data);
 alert("保存完了");
 loadToday();
});

/* 当日表示 */
async function loadToday(){
 todayCards.innerHTML="";
 const today=new Date().toISOString().split("T")[0];
 const q=query(collection(db,"reports"),where("date","==",today));
 const snap=await getDocs(q);
 snap.forEach(doc=>{
  const d=doc.data();
  const div=document.createElement("div");
  div.className="card "+(d.isWin?"win":"lose");
  div.innerHTML=d.isWin?
   `${d.lastName||""} ${d.firstName||""}<br>買取:${d.buyTotal||0}円`:
   `失注<br>${d.loseReason||""}`;
  todayCards.appendChild(div);
 });
}
loadToday();

</script>
</body>
</html>
