<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報管理</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where,
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= Firebase ================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= 年齢自動計算 ================= */

window.calcAge = function(){
  const birth = document.getElementById("birth").value;
  if(!birth) return;
  const today = new Date();
  const b = new Date(birth);
  let age = today.getFullYear() - b.getFullYear();
  if(today < new Date(today.getFullYear(), b.getMonth(), b.getDate())){
    age--;
  }
  document.getElementById("age").value = age;
};

/* ================= 郵便番号自動反映 ================= */

window.searchZip = async function(){
  const zip = document.getElementById("zip").value;
  if(zip.length !== 7) return;

  const res = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`);
  const data = await res.json();

  if(data.results){
    document.getElementById("pref").value = data.results[0].address1;
    document.getElementById("city").value = data.results[0].address2;
    document.getElementById("town").value = data.results[0].address3;
  }
};

/* ================= 顧客検索 ================= */

window.searchCustomer = async function(){

  const phone = document.getElementById("phoneSearch").value;
  if(!phone){
    alert("電話番号を入力してください");
    return;
  }

  const q = query(collection(db,"customers"), where("phone","==",phone));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("顧客が見つかりません");
    return;
  }

  const d = snap.docs[0].data();

  lastName.value = d.lastName || "";
  firstName.value = d.firstName || "";
  gender.value = d.gender || "男性";
  birth.value = d.birth || "";
  age.value = d.age || "";
  job.value = d.job || "";
  mainItem.value = d.mainItem || "";
  phoneInput.value = d.phone || "";
  zip.value = d.zip || "";
  pref.value = d.pref || "";
  city.value = d.city || "";
  town.value = d.town || "";
  address.value = d.address || "";

  alert("顧客情報を反映しました");
};

/* ================= 買取品目 ================= */

window.addRow = function(){
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><input class="item"></td>
    <td><input type="number" class="buy" value="0"></td>
    <td><input type="number" class="sell" value="0"></td>
    <td><button type="button" onclick="this.parentElement.parentElement.remove();calcTotal()">削除</button></td>
  `;
  document.querySelector("#itemTable tbody").appendChild(tr);
  tr.querySelectorAll("input").forEach(i=>i.addEventListener("input",calcTotal));
};

window.calcTotal = function(){
  let buy=0, sell=0;
  document.querySelectorAll(".buy").forEach(i=>buy+=Number(i.value));
  document.querySelectorAll(".sell").forEach(i=>sell+=Number(i.value));
  document.getElementById("buyTotal").innerText = buy;
  document.getElementById("sellTotal").innerText = sell;
};

/* ================= 保存 ================= */

window.saveData = async function(){

  const data = {
    visitTime:visitTime.value,
    salesType:salesType.value,
    media:media.value,
    staff:staff.value,
    lastName:lastName.value,
    firstName:firstName.value,
    gender:gender.value,
    birth:birth.value,
    age:age.value,
    job:job.value,
    mainItem:mainItem.value,
    phone:phoneInput.value,
    zip:zip.value,
    pref:pref.value,
    city:city.value,
    town:town.value,
    address:address.value,
    thanks:thanks.checked,
    review:review.checked,
    buyTotal:buyTotal.innerText,
    sellTotal:sellTotal.innerText,
    createdAt:serverTimestamp()
  };

  await addDoc(collection(db,"reports"),data);

  /* 顧客マスター保存 */
  const q = query(collection(db,"customers"), where("phone","==",phoneInput.value));
  const snap = await getDocs(q);
  if(snap.empty){
    await addDoc(collection(db,"customers"),data);
  }

  alert("保存しました");
};

</script>

<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px}
.card{background:white;padding:20px;border-radius:10px}
.flex{display:flex;gap:15px;margin-bottom:10px}
input,select,textarea{padding:5px;width:100%}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:5px;text-align:center}
button{padding:6px 12px;background:#2c7be5;color:white;border:none;border-radius:5px;cursor:pointer}
.cards{display:flex;gap:10px;margin-top:20px}
</style>
</head>

<body>

<div class="card">

<h3>来店情報</h3>
<div class="flex">
  <div><label>来店時間</label><input type="time" id="visitTime"></div>
  <div><label>営業形態</label><input id="salesType"></div>
  <div><label>媒体</label><input id="media"></div>
  <div><label>担当者</label><input id="staff"></div>
</div>

<h3>顧客検索</h3>
<div class="flex">
  <input id="phoneSearch" placeholder="電話番号">
  <button onclick="searchCustomer()">検索</button>
</div>

<h3>顧客情報</h3>
<div class="flex">
  <div><label>姓</label><input id="lastName"></div>
  <div><label>名</label><input id="firstName"></div>
</div>

<div class="flex">
  <div>
    <label>性別</label>
    <select id="gender">
      <option>男性</option>
      <option>女性</option>
    </select>
  </div>
  <div><label>生年月日</label><input type="date" id="birth" onchange="calcAge()"></div>
  <div><label>年齢</label><input id="age" readonly></div>
</div>

<label>職業</label><input id="job">
<label>メイン品目</label><input id="mainItem">
<label>電話番号</label><input id="phoneInput">

<label>郵便番号</label>
<input id="zip" onblur="searchZip()">

<div class="flex">
  <div><label>県</label><input id="pref"></div>
  <div><label>市区</label><input id="city"></div>
  <div><label>町</label><input id="town"></div>
</div>

<label>番地など</label><input id="address">

<label><input type="checkbox" id="thanks"> 初回お礼手紙</label>
<label><input type="checkbox" id="review"> 口コミ獲得</label>

<h3>買取品目</h3>
<table id="itemTable">
<thead>
<tr><th>品目</th><th>買取価格</th><th>売上価格</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow()">＋追加</button>

<h4>買取合計: <span id="buyTotal">0</span> 円</h4>
<h4>売上合計: <span id="sellTotal">0</span> 円</h4>

<br>
<button onclick="saveData()">保存</button>

<h3>本日の日報</h3>
<div class="cards" id="todayCards"></div>

</div>
</body>
</html>
