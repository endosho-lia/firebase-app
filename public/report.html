<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報管理</title>
<link rel="stylesheet" href="menu.css">

<style>
body{font-family:sans-serif;background:#f4f4f4;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.section{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,textarea{width:100%;padding:8px;margin:4px 0;border:1px solid #ccc;border-radius:6px}
.flex{display:flex;gap:10px}
.flex>div{flex:1}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
.saveBtn{background:#e53935;color:white;padding:12px;border:none;border-radius:8px;width:100%;font-size:16px;margin-top:15px}

.toggleWrap{display:flex;gap:10px;margin-bottom:15px}
.toggleBtn{flex:1;padding:14px;font-size:18px;border:none;border-radius:10px;cursor:pointer;background:#ccc;color:white;}
.winActive{background:#2e7d32}
.loseActive{background:#c62828}

.cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.card{padding:10px;border-radius:8px;color:white;min-width:220px}
.win{background:#2e7d32}
.lose{background:#c62828}
</style>
</head>

<body>
<div class="container">

<h2>日報入力</h2>

<div class="toggleWrap">
<button id="winBtn" class="toggleBtn">成約</button>
<button id="loseBtn" class="toggleBtn">失注</button>
</div>

<div id="winForm" class="section hidden">

<h3>顧客検索</h3>
<div class="flex">
<div><input id="searchPhone" placeholder="電話番号で検索"></div>
<div><button type="button" id="searchBtn">検索</button></div>
</div>

<h3>顧客情報</h3>

<div class="flex">
<div><label>姓</label><input id="lastName"></div>
<div><label>名</label><input id="firstName"></div>
</div>

<div class="flex">
<div>
<label>性別</label>
<select id="gender">
<option>男性</option>
<option>女性</option>
</select>
</div>
<div><label>生年月日</label><input type="date" id="birth"></div>
<div><label>年齢</label><input id="age" readonly></div>
</div>

<label>職業</label><input id="job">
<label>メイン品目</label><input id="mainItem">
<label>電話番号</label><input id="phone">
<label>郵便番号</label><input id="zip">

<div class="flex">
<div><label>県</label><input id="pref"></div>
<div><label>市区</label><input id="city"></div>
<div><label>町</label><input id="town"></div>
</div>

<label>番地など</label><input id="address">

</div>

<button class="saveBtn" id="saveBtn">保存</button>

<h3>本日の日報</h3>
<div class="cards" id="todayCards"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore,
         collection,
         addDoc,
         query,
         where,
         getDocs,
         serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { createMenu } from "./menu.js";

/* Firebase */
const firebaseConfig={
 apiKey:"AIzaSyACBuhohMmUJc_aQScQGqeLMN8mmsxRFmo",
 authDomain:"liagroup-a1ab1.firebaseapp.com",
 projectId:"liagroup-a1ab1",
 storageBucket:"liagroup-a1ab1.appspot.com",
 messagingSenderId:"361842389207",
 appId:"1:361842389207:web:1a7b92ef9d85b2726a4092"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

onAuthStateChanged(auth,user=>{
 if(!user){location.href="index.html";return;}
 createMenu("日報入力");
});

/* DOM */
const winBtn=document.getElementById("winBtn");
const winForm=document.getElementById("winForm");
const todayCards=document.getElementById("todayCards");

winBtn.onclick=()=>{
 winForm.classList.remove("hidden");
 winBtn.classList.add("winActive");
};

/* 年齢自動計算 */
birth.addEventListener("change",()=>{
 const b=new Date(birth.value);
 const today=new Date();
 let ageCalc=today.getFullYear()-b.getFullYear();
 if(today < new Date(today.getFullYear(),b.getMonth(),b.getDate())) ageCalc--;
 age.value=ageCalc;
});

/* 郵便番号→住所 */
zip.addEventListener("blur",async()=>{
 const res=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip.value}`);
 const data=await res.json();
 if(data.results){
  pref.value=data.results[0].address1;
  city.value=data.results[0].address2;
  town.value=data.results[0].address3;
 }
});

/* 顧客検索 */
searchBtn.onclick=async()=>{
 const q=query(collection(db,"customers"),where("phone","==",searchPhone.value));
 const snap=await getDocs(q);
 if(snap.empty){alert("顧客なし");return;}
 const d=snap.docs[0].data();

 lastName.value=d.lastName||"";
 firstName.value=d.firstName||"";
 gender.value=d.gender||"男性";
 birth.value=d.birth||"";
 age.value=d.age||"";
 job.value=d.job||"";
 mainItem.value=d.mainItem||"";
 phone.value=d.phone||"";
 zip.value=d.zip||"";
 pref.value=d.pref||"";
 city.value=d.city||"";
 town.value=d.town||"";
 address.value=d.address||"";
};

/* 保存 */
saveBtn.onclick=async()=>{
 const today=new Date().toISOString().split("T")[0];

 const customerData={
  lastName:lastName.value,
  firstName:firstName.value,
  gender:gender.value,
  birth:birth.value,
  age:age.value,
  job:job.value,
  mainItem:mainItem.value,
  phone:phone.value,
  zip:zip.value,
  pref:pref.value,
  city:city.value,
  town:town.value,
  address:address.value,
  updatedAt:serverTimestamp()
 };

 await addDoc(collection(db,"reports"),{
  ...customerData,
  date:today,
  createdAt:serverTimestamp()
 });

 const q=query(collection(db,"customers"),where("phone","==",phone.value));
 const snap=await getDocs(q);
 if(snap.empty){
   await addDoc(collection(db,"customers"),customerData);
 }

 alert("保存完了");
 loadToday();
};

/* 本日表示 */
async function loadToday(){
 todayCards.innerHTML="";
 const today=new Date().toISOString().split("T")[0];
 const q=query(collection(db,"reports"),where("date","==",today));
 const snap=await getDocs(q);
 snap.forEach(doc=>{
  const d=doc.data();
  const div=document.createElement("div");
  div.className="card win";
  div.innerHTML=`${d.lastName||""} ${d.firstName||""}<br>${d.phone||""}`;
  todayCards.appendChild(div);
 });
}
loadToday();
</script>
</body>
</html>
